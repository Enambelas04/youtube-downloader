    .container { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem 1.5rem; }

    h1 span { color: var(--red); }
    .subtitle { font-family: var(--font-mono); font-size: 0.8rem; color: var(--gray); letter-spacing: 0.05em; }
    .card { width: 100%; max-width: 580px; background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 2rem; animation: fadeUp 0.7s 0.2s ease both; position: relative; overflow: hidden; }
    .card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, var(--red), transparent); }
    .label { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray); margin-bottom: 0.6rem; display: block; }
    .input-wrap { display: flex; gap: 0.75rem; margin-bottom: 1.2rem; flex-wrap: wrap; }
    input[type="text"] { flex: 1; min-width: 0; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--white); font-family: var(--font-mono); font-size: 0.8rem; padding: 0.85rem 1rem; outline: none; transition: border-color 0.2s; }
    input[type="text"]:focus { border-color: var(--red); }
    input[type="text"]::placeholder { color: var(--gray); }
    .format-wrap { display: flex; gap: 0.5rem; margin-bottom: 1.2rem; }
    .format-btn { flex: 1; padding: 0.65rem; border-radius: 3px; border: 1px solid var(--border); background: var(--bg); color: var(--gray); font-family: var(--font-mono); font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em; cursor: pointer; transition: all 0.2s; text-align: center; }
    .format-btn.active-mp4 { border-color: var(--red); color: var(--red); background: var(--red-dim); }
    .format-btn.active-mp3 { border-color: var(--mp3); color: var(--mp3); background: #f9a82522; }
    button.btn-main { background: var(--red); color: #fff; border: none; border-radius: 3px; font-family: var(--font-display); font-weight: 700; font-size: 0.85rem; padding: 0.85rem 1.5rem; cursor: pointer; transition: background 0.2s, transform 0.1s; white-space: nowrap; flex-shrink: 0; }
    button.btn-main:hover { background: #e02020; }
    button.btn-main:disabled { background: var(--gray); cursor: not-allowed; }
    button.btn-main.mp3-mode { background: var(--mp3); color: #000; }
    .status { font-family: var(--font-mono); font-size: 0.75rem; padding: 0.75rem 1rem; border-radius: 3px; display: none; align-items: center; gap: 0.6rem; margin-bottom: 1rem; }
    .status.loading { display: flex; background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }
    .status.success { display: flex; background: #00e67611; border: 1px solid var(--success); color: var(--success); }
    .status.error { display: flex; background: var(--red-dim); border: 1px solid var(--red); color: var(--red); }
    .spinner { width: 14px; height: 14px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    .result { display: none; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; padding: 1.2rem; margin-top: 0.5rem; }
    .result.show { display: block; }
    .result-label { font-family: var(--font-mono); font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gray); margin-bottom: 0.6rem; }
    .result-url { font-family: var(--font-mono); font-size: 0.7rem; color: var(--success); word-break: break-all; line-height: 1.5; margin-bottom: 1rem; }
    .btn-download { display: inline-flex; align-items: center; gap: 0.5rem; background: var(--success); color: #000; border: none; border-radius: 3px; font-family: var(--font-display); font-weight: 700; font-size: 0.8rem; padding: 0.7rem 1.2rem; cursor: pointer; text-decoration: none; transition: opacity 0.2s; width: 100%; justify-content: center; }
    .btn-download.mp3 { background: var(--mp3); }
    .footer { margin-top: 2.5rem; font-family: var(--font-mono); font-size: 0.65rem; color: var(--gray); text-align: center; letter-spacing: 0.08em; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }

  </style>
</head>
